    <text x="84" y="184" fill="#F2F8FF" font-size="88" font-weight="800">Signal Garden</text>
    <text x="84" y="238" fill="#D4E5F6" font-size="32">Plant glowing procedural blooms in a dark little browser field.</text>
    <text x="84" y="284" fill="#9CB4CC" font-size="26">Replay gardens. Share exact layouts. Export the field as a PNG.</text>
  </g>

