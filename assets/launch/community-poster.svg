<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111a"/>
      <stop offset="100%" stop-color="#12233a"/>
    </linearGradient>
    <radialGradient id="glow-violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 910) rotate(90) scale(260 420)">
      <stop offset="0%" stop-color="#8f6cff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8f6cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(905 860) rotate(90) scale(250 360)">
      <stop offset="0%" stop-color="#36d9ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#36d9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" rx="40" fill="url(#bg)"/>
  <rect x="26" y="26" width="1148" height="1148" rx="34" stroke="#28405f" stroke-opacity="0.6"/>
