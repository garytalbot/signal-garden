  <rect width="64" height="64" rx="16" fill="url(#violetGlow)"/>
  <rect width="64" height="64" rx="16" fill="url(#cyanGlow)"/>

  <g opacity="0.4">
    <circle cx="18" cy="11" r="0.9" fill="#fff"/>
    <circle cx="49.5" cy="16" r="0.85" fill="#fff"/>
    <circle cx="55" cy="23" r="0.8" fill="#fff"/>
  </g>

  <ellipse cx="32" cy="50" rx="17" ry="6" fill="#7cff8f" fill-opacity="0.16" filter="url(#softBloom)"/>
  <path d="M32 46.5V28" stroke="#7ee7ff" stroke-width="3" stroke-linecap="round"/>

  <g filter="url(#softBloom)">
