<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12233a"/>
      <stop offset="1" stop-color="#07111a"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(24 15) rotate(52) scale(28 24)">
      <stop offset="0" stop-color="#9d7bff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#9d7bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(45 44) rotate(90) scale(20 24)">
      <stop offset="0" stop-color="#55e6ff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#55e6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBloom" x="-50%" y="-50%" width="200%" height="200%">
