  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" stroke="#28405f" stroke-opacity="0.72"/>
  <circle cx="13" cy="12" r="9" fill="#8f6cff" fill-opacity="0.16"/>
